name: Build and publish

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build container and .deb
        run: |
          nix build .#container --out-link result-container
          nix build .#amonDeb --out-link result-deb

      - name: Load container image
        run: |
          docker load -i result-container

      - name: Tag container image
        run: |
          docker tag amon:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker tag amon:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF_NAME#v}
            docker tag amon:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$VERSION
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push container image
        run: |
          docker push --all-tags ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: amon-deb
          path: result-deb/amon_*.deb

      - name: Create GitHub release with .deb
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: result-deb/amon_*.deb
